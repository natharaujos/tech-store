<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./fontawesome-free-6.2.1-web/css/all.css" />
    <link rel="stylesheet" href="./sidebarStyle.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Sidebar</title>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div
          class="d-flex flex-column justify-content-between col-auto bg-dark min-vh-100"
        >
          <div class="mt-4">
            <a
              class="text-white d-none d-sm-inline text-decoration-none d-flex align-items-center ms-4"
              role="button"
            >
              <span class="fs-5">Sidemenu</span>
            </a>
            <hr class="text-white d-none d-sm-block" />
            <ul class="nav nav-pills flex-column mt-2 mt-sm-0" id="menu">
              <li class="nav-item my-sm-1 my-2">
                <a
                  href="#"
                  class="nav-link text-white text-center text-sm-start"
                  aria-current="page"
                >
                  <i class="fa fa-gauge"></i>
                  <span class="ms-2 d-none d-sm-inline">Dashboard</span>
                </a>
              </li>
              <li class="nav-item my-sm-1 my-2">
                <a
                  href="#"
                  class="nav-link text-white text-center text-sm-start"
                  aria-current="page"
                >
                  <i class="fa fa-house"></i>
                  <span class="ms-2 d-none d-sm-inline">Home</span>
                </a>
              </li>
              <li class="nav-item my-sm-1 my-2">
                <a
                  href="#"
                  class="nav-link text-white text-center text-sm-start"
                  aria-current="page"
                >
                  <i class="fa fa-table"></i>
                  <span class="ms-2 d-none d-sm-inline">Products</span>
                </a>
              </li>
              <li class="nav-item my-sm-1 my-2">
                <a
                  href="#"
                  class="nav-link text-white text-center text-sm-start"
                  aria-current="page"
                >
                  <i class="fa fa-users"></i>
                  <span class="ms-2 d-none d-sm-inline">Customers</span>
                </a>
              </li>
            </ul>
          </div>
          <div>
            <div class="dropdown open">
              <a
                class="btn border-none outline-none text-white dropdown-toggle"
                type="button"
                id="triggerId"
                data-bs-toggle="dropdown"
                aria-haspopup="true"
                aria-expanded="false"
              >
                <i class="fa-fa-user"></i
                ><span class="ms-1 d-none d-sm-inline">Yousaf</span>
              </a>
              <div class="dropdown-menu" aria-labelledby="triggerId">
                <a class="dropdown-item" href="#">Profile</a>
                <a class="dropdown-item" href="#">Settings</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
